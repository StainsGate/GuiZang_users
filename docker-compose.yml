services:
  postgres:
    image: postgres:16-alpine
    container_name: gz_users_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gz_users
    ports:
      - "5432:5432"
    volumes:
      - gz_users_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gz_users"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  gz_users_postgres_data:
